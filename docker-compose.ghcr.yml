services:
  backend:
    image: ghcr.io/aantriono82/penilaian-backend:latest
    container_name: atiga-asesmen-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_PATH: /app/data/atiga-asesmen.db
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: ghcr.io/aantriono82/penilaian-frontend:latest
    container_name: atiga-asesmen-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  backend_data:

